; ═══════════════════════════════════════════════════════════════════
; PlatformIO Configuration — NumOS Calculadora Científica
; ═══════════════════════════════════════════════════════════════════

[platformio]
build_dir = C:/.piobuild/numOS

[env:esp32s3_n16r8]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino

; --- FORZAR RECONOCIMIENTO DE LIBRERÍAS ---
lib_ldf_mode = deep+
lib_archive = no

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
monitor_rts     = 1
monitor_dtr     = 1
upload_speed    = 921600

; --- Configuración Hardware ESP32-S3 N16R8 ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode           = qio
board_build.f_flash             = 80000000L
board_build.f_cpu               = 240000000L
board_upload.flash_size         = 16MB
board_build.partitions          = default_16MB.csv
board_build.filesystem          = littlefs

build_unflags =
    -std=gnu++11
    -DARDUINO_USB_MODE
    -fno-exceptions
    -fno-rtti

build_flags =
    -std=gnu++17
    -DDOUBLEVAL
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_LOOP_STACK_SIZE=65536
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

    ; --- TFT_eSPI ---
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_SPI_MODE=0
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DUSE_FSPI_PORT
    -DTFT_MISO=-1
    -DTFT_MOSI=13
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=4
    -DTFT_RST=5
    -DTFT_BL=45
    -DTFT_BACKLIGHT_ON=1
    -DTOUCH_CS=-1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=40000000

    ; --- LVGL 9.x ---
    -DLV_CONF_INCLUDE_SIMPLE
    -I lib/giac/src
    -I src
    -DLV_USE_DRAW_SW_ASM=0
    -DLV_USE_NATIVE_HELIUM_ASM=0
    -DLV_DRAW_SW_ASM_NONE=0
    -DLV_DRAW_SW_ASM_NEON=1
    -DLV_DRAW_SW_ASM_HELIUM=2

    ; --- GIAC / KhiCAS ---
    -DNUMOS_USE_GIAC=1
    -DGIAC_KHICAS
    -DNO_GUI
    -DGIAC_GENERIC
    -DEMBEDDED
    -UCASIO
    -DUMAP
    -fexceptions
    ; Forzamos rutas manuales por si el LDF falla
    -I lib/giac
    -I lib/giac/src
    -I lib/libtommath
    
    -DCORE_DEBUG_LEVEL=1

build_src_filter =
    +<*>

lib_deps =
    bodmer/TFT_eSPI
    lvgl/lvgl@^9.2.0
    ; Forzar dependencias locales: usa las carpetas bajo `lib/` directamente
    file://lib/giac
    file://lib/libtommath

; ═══════════════════════════════════════════════════════════════════
; Entorno de simulación nativa en PC
; ═══════════════════════════════════════════════════════════════════
[env:emulator_pc]
platform = native
build_flags =
    -DNATIVE_SIM
    -D_USE_MATH_DEFINES
    -std=c++17
    -DLV_CONF_INCLUDE_SIMPLE
    -I src
    -DLV_USE_DRAW_SW_ASM=0
    -DLV_DRAW_SW_ASM_NONE=0
    -DLV_DRAW_SW_ASM_NEON=1
    -DLV_DRAW_SW_ASM_HELIUM=2
    -IC:/SDL2/x86_64-w64-mingw32/include
    -LC:/SDL2/x86_64-w64-mingw32/lib
    -lmingw32
    -lSDL2main
    -lSDL2
lib_deps =
    lvgl/lvgl@^9.2.0
    giac
    libtommath
build_src_filter =
    +<hal/*>
    +<apps/CalculationApp.cpp>
    +<input/LvglKeypad.cpp>
    +<input/KeyboardManager.cpp>
    +<math/MathAST.cpp>
    +<math/CursorController.cpp>
    +<math/MathEvaluator.cpp>
    +<math/VariableManager.cpp>
    +<ui/StatusBar.cpp>
    +<ui/MathRenderer.cpp>
    +<ui/MathTypography.cpp>
    +<ui/SplashScreen.cpp>
    +<ui/MainMenu.cpp>
    +<fonts/stix_math_18.c>