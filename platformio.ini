; ═══════════════════════════════════════════════════════════════════
; PlatformIO Configuration — NumOS Calculadora Científica
; ═══════════════════════════════════════════════════════════════════

[platformio]
build_dir = C:/.piobuild/numOS
boards_dir = boards

[env:esp32s3_n16r8]
platform   = espressif32
board      = esp32-s3-devkitc-1-n16r8
framework  = arduino

; --- FORZAR RECONOCIMIENTO DE LIBRERÍAS ---
lib_ldf_mode = deep+
lib_archive = no

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
monitor_rts     = 0
monitor_dtr     = 0
upload_speed    = 921600

; --- Configuración Hardware ESP32-S3 N16R8 ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode           = qio
board_build.f_flash             = 80000000L
board_build.f_cpu               = 240000000L
board_upload.flash_size         = 16MB
board_build.partitions          = default_16MB.csv
board_build.filesystem          = littlefs

build_unflags =
    -std=gnu++11
    -DARDUINO_USB_MODE
    -fno-exceptions
    -fno-rtti

build_flags =
    -std=gnu++17
    -DDOUBLEVAL
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_LOOP_STACK_SIZE=65536
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DNUMOS_SERIAL_BACKEND_UART0=1

    ; --- TFT_eSPI ---
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_SPI_MODE=0
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DUSE_FSPI_PORT
    -DTFT_MISO=-1
    -DTFT_MOSI=13
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=4
    -DTFT_RST=5
    -DTFT_BL=45
    -DTFT_BACKLIGHT_ON=1
    -DTOUCH_CS=-1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=40000000

    ; --- LVGL 9.x ---
    -DLV_CONF_INCLUDE_SIMPLE
    -I lib/giac/src
    -I src
    -DLV_USE_DRAW_SW_ASM=0
    -DLV_USE_NATIVE_HELIUM_ASM=0
    -DLV_DRAW_SW_ASM_NONE=0
    -DLV_DRAW_SW_ASM_NEON=1
    -DLV_DRAW_SW_ASM_HELIUM=2

    ; --- GIAC / KhiCAS ---
    -DNUMOS_USE_GIAC=1
    -DGIAC_KHICAS
    -DNO_GUI
    -DGIAC_GENERIC
    -DEMBEDDED
    -UCASIO
    -DUMAP
    -fexceptions
    ; Forzamos rutas manuales por si el LDF falla
    -I lib/giac
    -I lib/giac/src
    -I lib/libtommath
    
    -DCORE_DEBUG_LEVEL=1

    ; Debug/validation flags are in [env:esp32s3_n16r8_validate] below, not here.

build_src_filter =
    +<*>

lib_deps =
    bodmer/TFT_eSPI
    lvgl/lvgl@^9.2.0
    ; Forzar dependencias locales: usa las carpetas bajo `lib/` directamente
    file://lib/giac
    file://lib/libtommath

; ═══════════════════════════════════════════════════════════════════
; Validation build — Math Visual fixture + one-shot coordinate traces.
; Usage: pio run -e esp32s3_n16r8_validate
; ═══════════════════════════════════════════════════════════════════
[env:esp32s3_n16r8_validate]
extends = env:esp32s3_n16r8
build_flags =
    ${env:esp32s3_n16r8.build_flags}
    -DNUMOS_MATH_VISUAL_VERIFY=1
    -DNUMOS_MATH_RENDER_TRACE_ONCE=1

; ═══════════════════════════════════════════════════════════════════
; Entorno de simulación nativa en PC
; ═══════════════════════════════════════════════════════════════════
; Validation variants.
[env:esp32s3_n16r8_validate_overlay]
extends = env:esp32s3_n16r8_validate
build_flags =
    ${env:esp32s3_n16r8_validate.build_flags}
    -DNUMOS_MATH_INK_OVERLAY=1

[env:esp32s3_n16r8_validate_sup1]
extends = env:esp32s3_n16r8_validate
build_flags =
    ${env:esp32s3_n16r8_validate.build_flags}
    -DNUMOS_SUPERSCRIPT_VPAM_ADJUST_PX=1

[env:esp32s3_n16r8_validate_usbcdc]
extends = env:esp32s3_n16r8_validate
build_unflags =
    ${env:esp32s3_n16r8.build_unflags}
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DNUMOS_SERIAL_BACKEND_UART0=1
build_flags =
    ${env:esp32s3_n16r8_validate.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DNUMOS_SERIAL_BACKEND_USB_CDC=1

; Native PC simulation environment.
[env:emulator_pc]
platform = native
; SDL2 include/lib/link flags are injected portably by scripts/sdl2_env.py
; (Windows: NUMOS_SDL2_ROOT/SDL2_DIR/SDL2_ROOT env, default C:/SDL2/...;
;  Linux/macOS: pkg-config/sdl2-config). No machine-specific SDL2 paths here.
; See docs/emulator-sdl2-quickstart.md.
extra_scripts = pre:scripts/sdl2_env.py
build_flags =
    -DNATIVE_SIM
    -D_USE_MATH_DEFINES
    -std=c++17
    -DLV_CONF_INCLUDE_SIMPLE
    -I src
    -DLV_USE_DRAW_SW_ASM=0
    -DLV_DRAW_SW_ASM_NONE=0
    -DLV_DRAW_SW_ASM_NEON=1
    -DLV_DRAW_SW_ASM_HELIUM=2
    ; lv_conf.h configures memory via the LVGL-8 LV_MEM_CUSTOM macro, which LVGL 9
    ; ignores — it falls back to a 64 KB BUILTIN pool (lv_mem.c). On 64-bit native,
    ; lv_obj/style structs are ~2x the 32-bit ESP32 size, so object-heavy screens
    ; (e.g. Grapher's 6-row Expressions panel) exhaust that pool: lv_malloc returns
    ; NULL -> LV_ASSERT_NULL -> default while(1) handler -> hang. Route LVGL 9's
    ; allocator to the system heap (no fixed pool); native-only, firmware untouched.
    -DLV_USE_STDLIB_MALLOC=LV_STDLIB_CLIB
lib_deps =
    lvgl/lvgl@^9.2.0
    ; Giac/libtommath are intentionally NOT listed here. The PlatformIO LDF
    ; would otherwise compile the Giac core (kgen.cc, kgausspol.cc, ...)
    ; natively, which fails (e.g. gen.h: 'SIZEOF_INT' not declared — native
    ; ABI/config divergence, spec risk R3). Native Giac is a deferred phase;
    ; the emulator baseline is "CAS unavailable via Giac" (spec §12.4/§12.6).
    ; The in-tree cas:: engine (linked below via build_src_filter) is a
    ; SEPARATE symbolic backend and does not depend on Giac.
; Hard-exclude the private lib/ Giac stack from the native build. lib/giac and
; lib/libtommath are private libraries, so PlatformIO would build them even
; without a lib_deps entry; lib_ignore is the canonical way to keep them out.
; Safe because no native TU references a Giac library header — the only giac
; include (MathEvaluator.cpp) is the project shim src/math/giac/GiacBridge.h,
; and its solveWithGiac() call site is #ifdef ARDUINO only.
lib_ignore =
    giac
    libtommath
build_src_filter =
    +<hal/*>
    +<apps/CalculationApp.cpp>
    ; Phase 5A: SettingsApp is LVGL-native and emulator-safe (no Arduino/NVS;
    ; its values are the setting_* globals defined in NativeHal.cpp:103-105).
    +<apps/SettingsApp.cpp>
    ; Phase 6A: Statistics & Probability are LVGL-only educational apps. Each
    ; pulls ONLY lvgl + ui::StatusBar + input/KeyCodes + KeyboardManager + a pure
    ; <cmath>/STL engine (no Giac/CAS, no LittleFS/Preferences, no heap_caps/PSRAM,
    ; no sensors/WiFi). Their .h/.cpp are unchanged; they are merely added here so
    ; the native build links them (firmware already compiles them via +<*>).
    +<apps/StatisticsApp.cpp>
    +<apps/StatsEngine.cpp>
    +<apps/ProbabilityApp.cpp>
    +<apps/ProbEngine.cpp>
    ; Phase 7A: SequencesApp is LVGL-only (2-tab Define/Table). It pulls ONLY lvgl +
    ; ui::StatusBar + input/KeyCodes + KeyboardManager + a self-contained sscanf-based
    ; recompute() (no Giac/CAS, no LittleFS/Preferences, no heap_caps/PSRAM, no sensors).
    ; Its .h/.cpp are unchanged; this line only lets the native build link it (firmware
    ; already compiles it via +<*>). No engine companion file (unlike Stats/Prob).
    +<apps/SequencesApp.cpp>
    ; Phase 7C: RegressionApp is LVGL-only (3-tab Data/Equation/Graph) backed by a pure
    ; <cmath> RegressionEngine (least-squares linear/quadratic; same shape as Stats/Prob).
    ; It pulls ONLY lvgl + ui::StatusBar + input/KeyCodes + KeyboardManager + that engine
    ; (no Giac/CAS, no LittleFS/Preferences, no heap_caps/PSRAM, no sensors). Its .h/.cpp
    ; are unchanged; these two lines only let the native build link it (firmware already
    ; compiles them via +<*>). Has an engine companion file, like Stats/Prob.
    +<apps/RegressionApp.cpp>
    +<apps/RegressionEngine.cpp>
    ; Phase 8G: GrapherApp (LVGL-native NumWorks-style grapher) + its MVC model
    ; (GraphModel) and pixel view (GraphView), plus the MINIMAL legacy RPN numeric
    ; pipeline GraphModel needs: Tokenizer/Parser/Evaluator/VariableContext. All are
    ; native-safe via the `#ifdef ARDUINO ... #else hal/ArduinoCompat.h` shim
    ; (VariableContext's NVS is ARDUINO-only; the others are pure C++). MathAnalysis
    ; completes GrapherApp's link closure (math::findRoot/findExtremum/findIntersection).
    ; None pull Giac/CAS/renderer beyond files already linked above; VariableManager.cpp
    ; (223) and MathEvaluator.cpp (222) are GrapherApp deps already present — NOT re-added.
    ; Individual files only — no globs.
    +<apps/GrapherApp.cpp>
    +<apps/GraphModel.cpp>
    +<ui/GraphView.cpp>
    +<math/Tokenizer.cpp>
    +<math/Parser.cpp>
    +<math/Evaluator.cpp>
    +<math/VariableContext.cpp>
    +<math/MathAnalysis.cpp>
    +<input/LvglKeypad.cpp>
    +<input/KeyboardManager.cpp>
    +<math/MathAST.cpp>
    +<math/font/MathGlyphAssembly.cpp>
    +<math/CursorController.cpp>
    +<math/MathEvaluator.cpp>
    +<math/VariableManager.cpp>
    ; Phase 5A: curated accepted render cases reused by the emulator-only Math
    ; Showcase (already guarded `!defined(ARDUINO)`; reuses accepted geometry).
    +<math/MathRenderVisualCases.cpp>
    ; --- in-tree CAS engine (edu-steps in CalculationApp); NOT Giac ---
    +<math/cas/ASTFlattener.cpp>
    +<math/cas/SymSimplify.cpp>
    +<math/cas/SymExprToAST.cpp>
    +<math/cas/SymExpr.cpp>
    +<math/cas/ConsTable.cpp>
    +<math/cas/CASStepLogger.cpp>
    +<math/cas/SymPoly.cpp>
    +<ui/StatusBar.cpp>
    +<ui/MathRenderer.cpp>
    +<ui/MathTypography.cpp>
    +<ui/SplashScreen.cpp>
    +<ui/MainMenu.cpp>
    +<fonts/stix_math_18.c>
    +<fonts/stix_math_12.c>
    +<fonts/stix_math_8.c>
