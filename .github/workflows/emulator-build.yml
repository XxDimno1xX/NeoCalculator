name: Build Emulator (native)

# Additive, non-release CI for the SDL2 desktop emulator.
#
# This is SEPARATE from compile-and-release.yml (firmware) on purpose:
#   * it never creates a release / artifact spam;
#   * it cannot affect the firmware build or release job;
#   * a failure here is portability SIGNAL, not a firmware regression.
#
# It is also the mechanism that actually PROVES the Linux native build, which has
# not yet been run on the author's (Windows-only) machine. See
# docs/emulator-sdl2-quickstart.md.

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/emulator/**'
      - 'tests/host/**'
      - 'platformio.ini'
      - 'scripts/sdl2_env.py'
      # The visual gate's own logic: changing the comparator or candidate
      # generator must re-run the gate. (Promoting a golden already triggers via
      # 'tests/emulator/**'. The human-run promote-emulator-golden.py is
      # deliberately NOT listed — CI never invokes it.)
      - 'scripts/compare-ppm.py'
      - 'scripts/generate-emulator-candidates.py'
      - 'scripts/check-keycode-digit-patterns.py'
      - '.github/workflows/emulator-build.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/emulator/**'
      - 'tests/host/**'
      - 'platformio.ini'
      - 'scripts/sdl2_env.py'
      # Keep in sync with push.paths above: the gate must re-run when its own
      # comparator / candidate generator changes.
      - 'scripts/compare-ppm.py'
      - 'scripts/generate-emulator-candidates.py'
      - 'scripts/check-keycode-digit-patterns.py'
      - '.github/workflows/emulator-build.yml'
  workflow_dispatch:

jobs:
  emulator-linux:
    name: Linux emulator (Ubuntu + system SDL2)
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[no build]') }}
    runs-on: ubuntu-latest

    # Use the portable default build dir instead of the repo's Windows-only
    # build_dir = C:/.piobuild/numOS. No sed hack required.
    env:
      PLATFORMIO_BUILD_DIR: .pio/build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev
          pkg-config --modversion sdl2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Diagnose dependencies
        run: python scripts/check-emulator-deps.py

      # ---------------------------------------------------------------------
      # KeyCode digit-helper regression guard (Phase 6F).
      #
      # Two cheap, fail-fast checks that protect the digit-entry fix from
      # Phases 6D/6E (StatisticsApp, ProbabilityApp, CircuitCoreApp, MatricesApp,
      # RegressionApp, SequencesApp). The KeyCode enum lays NUM_0..NUM_9 out in
      # physical keypad order, so NUM_0 > NUM_9; the old `>= NUM_0 && <= NUM_9`
      # range test silently dropped every digit and `code - NUM_0` was garbage.
      #   1. Static scan — fails if that range test or the `- NUM_0` enum
      #      arithmetic ever reappears under src/ (comment-aware; switch labels
      #      and the doc notes are not flagged). --selftest first proves the
      #      matcher itself still catches the bad idioms.
      #   2. Host unit test — actually executes keyCodeDigitValue() and asserts
      #      NUM_0..NUM_9 -> 0..9 and that representative non-digits return -1.
      # Neither touches firmware/runtime code; running it before the build makes
      # a digit regression fail in seconds instead of after the full build.
      - name: KeyCode digit-helper guard (Phase 6F)
        run: |
          set -euo pipefail
          echo "--- static anti-pattern scan (src/) ---"
          python scripts/check-keycode-digit-patterns.py --selftest
          python scripts/check-keycode-digit-patterns.py
          echo "--- host unit test (keyCodeDigitValue) ---"
          # Build OUTSIDE the repo: a binary in the repo root would trip the
          # CI-01 dirty-tree guard. trap guarantees cleanup even if the
          # compile or the test itself fails (set -e exits through EXIT).
          KDT_TMP="$(mktemp -d)"
          trap 'rm -rf "$KDT_TMP"' EXIT
          g++ -std=c++17 -Wall -Wextra tests/host/keycode_digit_test.cpp -o "$KDT_TMP/keycode_digit_test"
          "$KDT_TMP/keycode_digit_test"

      # ---------------------------------------------------------------------
      # CAS host suites (CAS-01).
      #
      # Runs the formerly dormant tests/*.cpp CAS suites on a standalone g++
      # host build (never a PlatformIO env, never Giac/libtommath — see
      # docs/specs/NUMOS_CAS_HOST_HARNESS_SPEC.md). Each suite runs in an
      # isolated child process with a 60 s timeout so a crashing suite can
      # never take out the driver. Known pre-existing engine bugs are XFAIL'd
      # per-case in tests/host/cas_xfail.list (currently NB-6: SymPoly
      # ExactVal bridge drops piMul) and NOT fixed by this lane. An XFAIL
      # entry that starts passing is XPASS and fails the run, so bug-fix PRs
      # must prune the list visibly.
      # Expected green footer: total suites=8 pass=7 xfail=1 unexpected=0.
      # Runs before the emulator build so CAS regressions fail in ~30 s.
      - name: CAS host suites (CAS-01)
        run: scripts/build-cas-host-tests.sh

      - name: CAS host suites (ASAN variant)
        run: scripts/build-cas-host-tests.sh --asan

      - name: Upload CAS host test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cas-host-test-logs
          path: |
            /tmp/cas-host-tests/*.log
            /tmp/cas-host-tests/summary.txt
          if-no-files-found: warn

      - name: Build emulator (emulator_pc)
        run: pio run -e emulator_pc

      - name: Upload Linux emulator binary
        uses: actions/upload-artifact@v4
        with:
          name: numos-emulator-linux
          path: .pio/build/emulator_pc/program
          if-no-files-found: error

      # ---------------------------------------------------------------------
      # Headless launch smoke (Phase 3A).
      #
      # Proves the binary actually BOOTS — not just that it links. The emulator
      # has an in-process auto-exit (--run-for-ms) so it terminates on its own;
      # `timeout` is a belt-and-suspenders guard so a regression that hangs can
      # never stall CI. SDL_VIDEODRIVER=dummy lets SDL open a window with no
      # display (libSDL2 ships the dummy driver); the --headless flag also sets
      # it in-process. We assert the boot reached the MainMenu, so an early
      # crash or a frozen splash fails the job.
      #
      # Verified equivalent locally on Windows: `--headless --run-for-ms` prints
      # `[MENU] Launcher cargado` then `[SIM] Bye!` and exits 0 under the
      # software renderer. If the GitHub runner's dummy driver ever proves
      # flaky, downgrade this step to `continue-on-error: true` (portability
      # signal only) rather than removing it.
      - name: Smoke-test emulator (headless, auto-exit)
        run: |
          set -euo pipefail
          BIN=.pio/build/emulator_pc/program
          echo "Launch: $BIN --headless --run-for-ms 5000 --quiet"
          SDL_VIDEODRIVER=dummy timeout 30s "$BIN" \
            --headless --run-for-ms 5000 --quiet | tee emu-smoke.log
          echo "--- asserting boot reached the launcher ---"
          grep -q "Launcher cargado" emu-smoke.log
          echo "OK: emulator booted to MainMenu and exited cleanly."

      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numos-emulator-smoke-log
          path: emu-smoke.log
          if-no-files-found: ignore

      # ---------------------------------------------------------------------
      # Deterministic headless smoke + screenshot (Phase 3B).
      #
      # Additive to the Phase 3A wall-clock smoke above (kept as-is). Here we run
      # a FIXED number of frames with the synthetic tick (--deterministic), so the
      # visual state is a function of the frame index, not host timing. The run
      # dumps the final 320x240 logical framebuffer to a PPM (P6) — a no-dependency
      # format written straight from the CPU buffer, so it works under the dummy
      # video driver. We assert: boot reached the launcher, the PPM exists and is
      # non-empty, and its header declares 320x240. This is artifact GENERATION +
      # stable launch only — no pixel-level correctness claim yet.
      - name: Deterministic smoke + screenshot (headless)
        run: |
          set -euo pipefail
          BIN=.pio/build/emulator_pc/program
          echo "Launch: $BIN --headless --frames 600 --deterministic --screenshot smoke.ppm --quiet"
          SDL_VIDEODRIVER=dummy timeout 30s "$BIN" \
            --headless --frames 600 --deterministic --screenshot smoke.ppm --quiet \
            2>&1 | tee emu-det-smoke.log
          echo "--- asserting boot reached the launcher ---"
          grep -q "Launcher cargado" emu-det-smoke.log
          echo "--- asserting deterministic tick was used ---"
          grep -q "tick = determinista" emu-det-smoke.log
          echo "--- asserting screenshot exists, is non-empty and 320x240 ---"
          test -s smoke.ppm
          head -c 32 smoke.ppm | tr '\n' ' ' | grep -q "P6 320 240"
          echo "OK: deterministic boot + 320x240 PPM screenshot generated."

      - name: Upload deterministic smoke log + screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numos-emulator-smoke
          path: |
            emu-det-smoke.log
            smoke.ppm
          if-no-files-found: ignore

      # ---------------------------------------------------------------------
      # Scripted deterministic replay smoke + screenshot (Phase 4A).
      #
      # Additive to the Phase 3A/3B smokes above (kept as-is). This drives the
      # emulator with a .numos script via the new --script flag: key events are
      # injected through the SAME dispatch path as live SDL input, one command
      # per deterministic frame. We run two fixtures (launcher + 1+2), assert the
      # script flag was honored (not silently ignored), the launcher was reached,
      # and the PPMs are 320x240. We also run calc_1_plus_2 TWICE and compare
      # SHA-256 to prove the headline Phase 4A claim: scripted replay is
      # byte-reproducible. This is artifact GENERATION + deterministic input —
      # NO pixel-level "1+2=3" correctness claim yet (that is Phase 4B).
      - name: Scripted deterministic replay smoke (headless, Phase 4A)
        run: |
          set -euo pipefail
          BIN=.pio/build/emulator_pc/program
          mkdir -p out
          test -f tests/emulator/scripts/launcher_smoke.numos
          test -f tests/emulator/scripts/calc_1_plus_2.numos

          echo "=== launcher_smoke ==="
          SDL_VIDEODRIVER=dummy timeout 60s "$BIN" \
            --headless --deterministic --script tests/emulator/scripts/launcher_smoke.numos \
            --frames 800 --screenshot out/launcher.ppm --quiet 2>&1 | tee out/launcher.log
          # The --script flag must be HONORED, not dropped as an unknown option.
          ! grep -q "opcion desconocida: --script" out/launcher.log
          grep -q "Launcher cargado" out/launcher.log
          grep -q "cargado 'tests/emulator/scripts/launcher_smoke.numos'" out/launcher.log
          test -s out/launcher.ppm
          head -c 32 out/launcher.ppm | tr '\n' ' ' | grep -q "P6 320 240"

          echo "=== calc_1_plus_2 (run 1) ==="
          SDL_VIDEODRIVER=dummy timeout 60s "$BIN" \
            --headless --deterministic --script tests/emulator/scripts/calc_1_plus_2.numos \
            --frames 1400 --screenshot out/calc_1_plus_2.ppm --quiet 2>&1 | tee out/calc_1_plus_2.log
          grep -q "CalculationApp activa" out/calc_1_plus_2.log
          test -s out/calc_1_plus_2.ppm
          head -c 32 out/calc_1_plus_2.ppm | tr '\n' ' ' | grep -q "P6 320 240"

          echo "=== calc_1_plus_2 (run 2, determinism) ==="
          SDL_VIDEODRIVER=dummy timeout 60s "$BIN" \
            --headless --deterministic --script tests/emulator/scripts/calc_1_plus_2.numos \
            --frames 1400 --screenshot out/calc_1_plus_2_b.ppm --quiet >/dev/null 2>&1
          A=$(sha256sum out/calc_1_plus_2.ppm   | cut -d' ' -f1)
          B=$(sha256sum out/calc_1_plus_2_b.ppm | cut -d' ' -f1)
          echo "run1=$A"
          echo "run2=$B"
          test "$A" = "$B"
          echo "OK: scripted deterministic replay is byte-reproducible (320x240 PPM)."

      - name: Upload Phase 4A scripted replay artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numos-emulator-scripted-smoke
          path: |
            out/launcher.log
            out/launcher.ppm
            out/calc_1_plus_2.log
            out/calc_1_plus_2.ppm
          if-no-files-found: ignore

      # ---------------------------------------------------------------------
      # Semantic assertions (Phase 4B-C) — additive, and SEPARATE from the
      # visual candidate/golden flow below (which is kept intact). This runs the
      # scripted fixtures headless+deterministic and lets the .numos `assert_*`
      # commands check the value CalculationApp actually COMPUTED — no OCR, no
      # pixels: 1+2 == 3 and 1/2+1/3 == 5/6. The emulator exits 0 on success and
      # 4 on any assertion failure; we assert exit 0 EXPLICITLY (redirect to a
      # file so the status is not masked by a pipe) and grep the PASS markers.
      # This proves correctness WITHOUT a hand-reviewed golden image.
      - name: Semantic assertion smoke (headless deterministic, Phase 4B-C)
        run: |
          set -euo pipefail
          BIN=.pio/build/emulator_pc/program
          mkdir -p out

          run_assert() {
            script="$1"; log="$2"
            echo "=== $script ==="
            rc=0
            SDL_VIDEODRIVER=dummy timeout 60s "$BIN" \
              --headless --deterministic --script "$script" \
              --frames 1400 --quiet > "$log" 2>&1 || rc=$?
            cat "$log"
            if [ "$rc" -ne 0 ]; then
              echo "::error::semantic assertions FAILED for $script (exit $rc)"
              return 1
            fi
            grep -q "PASS - assert_result" "$log"
            ! grep -q "FAIL -" "$log"
          }

          run_assert tests/emulator/scripts/calc_1_plus_2.numos     out/semantic_calc_1_plus_2.log
          grep -q "assert_result == '3'" out/semantic_calc_1_plus_2.log
          run_assert tests/emulator/scripts/calc_fraction_sum.numos out/semantic_calc_fraction_sum.log
          grep -q "assert_result == '5/6'" out/semantic_calc_fraction_sum.log
          echo "OK: semantic assertions passed (1+2==3, 1/2+1/3==5/6) with NO golden image."

      - name: Upload Phase 4B-C semantic smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numos-emulator-semantic-smoke
          path: |
            out/semantic_calc_1_plus_2.log
            out/semantic_calc_fraction_sum.log
          if-no-files-found: ignore

      # ---------------------------------------------------------------------
      # Calculation semantic suite (Phase 8C) — broader golden-free coverage.
      #
      # Additive to the Phase 4B-C step above and still SEPARATE from the visual
      # candidate/golden flow below. Runs the calc_semantic_*.numos group plus the
      # Phase 8B error/variable fixtures (which the 4B-C step does not run), all
      # headless + deterministic and bounded by --frames. Each script must exit 0,
      # print at least one "PASS -" marker, and print NO "FAIL -" marker. NO
      # screenshots, NO goldens: these prove COMPUTED values only, restricted to the
      # small-integer / exact-pure-fraction domain (no radicals/pi/e/decimals/Giac).
      - name: Calculation semantic suite (headless deterministic, Phase 8C)
        run: |
          set -euo pipefail
          BIN=.pio/build/emulator_pc/program
          mkdir -p out/semantic_8c

          run_semantic() {
            script="$1"
            name="$(basename "$script" .numos)"
            log="out/semantic_8c/${name}.log"
            echo "=== ${name} ==="
            rc=0
            SDL_VIDEODRIVER=dummy timeout 60s "$BIN" \
              --headless --deterministic --script "$script" \
              --frames 1400 --quiet > "$log" 2>&1 || rc=$?
            cat "$log"
            if [ "$rc" -ne 0 ]; then
              echo "::error::semantic suite FAILED for ${name} (exit $rc)"
              return 1
            fi
            if ! grep -q "PASS - " "$log"; then
              echo "::error::semantic suite: no PASS marker for ${name}"
              return 1
            fi
            if grep -q "FAIL - " "$log"; then
              echo "::error::semantic suite: FAIL marker present for ${name}"
              return 1
            fi
          }

          shopt -s nullglob
          # Phase 8C group (discovered) + the Phase 8B fixtures (explicit, so the
          # error/variable assertions also gate CI).
          scripts=( tests/emulator/scripts/calc_semantic_*.numos )
          scripts+=( tests/emulator/scripts/calc_error_div_by_zero.numos )
          scripts+=( tests/emulator/scripts/calc_store_variable.numos )
          # AM-01: runtime angle-mode truth (assert-only, no goldens).
          scripts+=( tests/emulator/scripts/angle_mode_settings_toggle_smoke.numos )
          scripts+=( tests/emulator/scripts/calc_angle_mode_deg_rad_smoke.numos )
          scripts+=( tests/emulator/scripts/grapher_angle_mode_sync_smoke.numos )

          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "::error::no semantic scripts discovered (calc_semantic_*.numos)"
            exit 1
          fi

          echo "--- discovered ${#scripts[@]} semantic script(s) ---"
          printf '%s\n' "${scripts[@]}"

          for s in "${scripts[@]}"; do
            run_semantic "$s"
          done
          echo "OK: ${#scripts[@]} Calculation semantic scripts passed (exact int/fraction, NO golden image)."

      - name: Upload Phase 8C semantic suite logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numos-emulator-semantic-8c
          path: out/semantic_8c/
          if-no-files-found: ignore

      # Input parity smoke (Phase 9A) — golden-free.
      #
      # Same assert-only contract as the Phase 8C suite above (run headless +
      # deterministic, require exit 0, at least one "PASS - " marker, and NO
      # "FAIL - " marker), and explicitly SEPARATE from the visual candidate/golden
      # flow below (these scripts are NOT in generate-emulator-candidates.py's
      # CANDIDATES list and take no screenshot). Runs the three input-parity scripts
      # added in Phase 9A. input_alias_surface also gates the script-alias map: an
      # unknown/renamed token makes loadScript exit 2 (parse error), failing here.
      - name: Input parity smoke (headless deterministic, Phase 9A)
        run: |
          set -euo pipefail
          BIN=.pio/build/emulator_pc/program
          mkdir -p out/input_9a

          run_input() {
            script="$1"
            name="$(basename "$script" .numos)"
            log="out/input_9a/${name}.log"
            echo "=== ${name} ==="
            rc=0
            SDL_VIDEODRIVER=dummy timeout 60s "$BIN" \
              --headless --deterministic --script "$script" \
              --frames 1400 --quiet > "$log" 2>&1 || rc=$?
            cat "$log"
            if [ "$rc" -ne 0 ]; then
              echo "::error::input parity smoke FAILED for ${name} (exit $rc)"
              return 1
            fi
            if ! grep -q "PASS - " "$log"; then
              echo "::error::input parity smoke: no PASS marker for ${name}"
              return 1
            fi
            if grep -q "FAIL - " "$log"; then
              echo "::error::input parity smoke: FAIL marker present for ${name}"
              return 1
            fi
          }

          run_input tests/emulator/scripts/input_alias_surface.numos
          run_input tests/emulator/scripts/calc_input_extended.numos
          run_input tests/emulator/scripts/grapher_input_navigation.numos
          echo "OK: 3 Phase 9A input-parity scripts passed (alias surface + SQRT/DEL calc + Grapher nav, NO golden image)."

      - name: Upload Phase 9A input parity logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numos-emulator-input-9a
          path: out/input_9a/
          if-no-files-found: ignore

      # Menu navigation parity smoke (Phase 9B) — golden-free.
      #
      # Same assert-only contract as the Phase 8C / 9A suites above (run headless +
      # deterministic, require exit 0, at least one "PASS - " marker, and NO
      # "FAIL - " marker), and explicitly SEPARATE from the visual candidate/golden
      # flow below (these scripts take NO screenshot and are NOT in
      # generate-emulator-candidates.py's CANDIDATES list). They prove the emulator
      # launcher arrows follow the firmware's MainMenu::moveFocusByDelta 2D grid
      # (not LVGL's linear group order) and that ENTER launches the focused card.
      # menu_nav_parity also guards the new assert_menu_focus command: a focus
      # mismatch exits 4, an unknown card token exits 2 (parse) — either fails here.
      - name: Menu navigation parity smoke (headless deterministic, Phase 9B)
        run: |
          set -euo pipefail
          BIN=.pio/build/emulator_pc/program
          mkdir -p out/menu_9b

          run_menu() {
            script="$1"
            name="$(basename "$script" .numos)"
            log="out/menu_9b/${name}.log"
            echo "=== ${name} ==="
            rc=0
            SDL_VIDEODRIVER=dummy timeout 60s "$BIN" \
              --headless --deterministic --script "$script" \
              --frames 1400 --quiet > "$log" 2>&1 || rc=$?
            cat "$log"
            if [ "$rc" -ne 0 ]; then
              echo "::error::menu parity smoke FAILED for ${name} (exit $rc)"
              return 1
            fi
            if ! grep -q "PASS - " "$log"; then
              echo "::error::menu parity smoke: no PASS marker for ${name}"
              return 1
            fi
            if grep -q "FAIL - " "$log"; then
              echo "::error::menu parity smoke: FAIL marker present for ${name}"
              return 1
            fi
          }

          run_menu tests/emulator/scripts/menu_nav_parity.numos
          run_menu tests/emulator/scripts/menu_enter_launch.numos
          echo "OK: 2 Phase 9B menu-parity scripts passed (2D-grid focus + ENTER launch, NO golden image)."

      - name: Upload Phase 9B menu parity logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numos-emulator-menu-9b
          path: out/menu_9b/
          if-no-files-found: ignore

      # Grapher no-hang / function / template guard (Phase 9F) — golden-free.
      #
      # Same assert-only contract as the Phase 8C / 9A / 9B suites above (run
      # headless + deterministic, require exit 0, at least one "[ASSERT] ... PASS"
      # marker, and NO "[ASSERT] ... FAIL" marker), and explicitly SEPARATE from the
      # visual candidate/golden flow below: these scripts are NOT in
      # generate-emulator-candidates.py's CANDIDATES list, so the screenshots a few
      # of them write under out/ never become a gating golden. They lock in the
      # Phase 9F manual-QA Grapher fixes (committed in 98328f3):
      #   * grapher_home_return  — HOME (MODE) returns to the launcher from EVERY
      #     Grapher state (Expressions / Graph / Table / Trace / Templates modal /
      #     mid-edit) and re-entry still works. Before 9F's deferred teardown this
      #     hung in lv_timer_handler on the first return.
      #   * grapher_tan_exit     — y=tan(x) (asymptotes) plots, pans, traces, and
      #     returns to the launcher without hanging.
      #   * grapher_functions    — sin/cos/tan/ln/log insert + serialize + graph.
      #   * grapher_logbase      — log with an explicit base inserts, renders, graphs
      #     (change-of-base identity), tabulates, and exits.
      #   * grapher_template_insert / grapher_template_all — templates insert REAL
      #     plottable expressions (OpKind::Eq serialization fix) and plot.
      # A hang trips the per-script `timeout` (nonzero exit -> fail); a broken fix
      # trips an assertion (exit 4 + "[ASSERT] ... FAIL"). mkdir out/ so the
      # screenshot-taking scripts have a writable target (those images are uploaded
      # for human inspection, never gated).
      - name: Grapher no-hang / function / template guard (headless deterministic, Phase 9F)
        run: |
          set -euo pipefail
          BIN=.pio/build/emulator_pc/program
          mkdir -p out out/grapher_9f

          run_grapher() {
            script="$1"
            name="$(basename "$script" .numos)"
            log="out/grapher_9f/${name}.log"
            echo "=== ${name} ==="
            rc=0
            SDL_VIDEODRIVER=dummy timeout 60s "$BIN" \
              --headless --deterministic --script "$script" \
              --frames 1400 --quiet > "$log" 2>&1 || rc=$?
            cat "$log"
            if [ "$rc" -ne 0 ]; then
              echo "::error::grapher guard FAILED for ${name} (exit $rc -- hang/timeout or assertion failure)"
              return 1
            fi
            if grep -qE '\[ASSERT\].*: FAIL -' "$log"; then
              echo "::error::grapher guard: [ASSERT] FAIL present for ${name}"
              return 1
            fi
            if ! grep -qE '\[ASSERT\].*: PASS -' "$log"; then
              echo "::error::grapher guard: no [ASSERT] PASS marker for ${name}"
              return 1
            fi
          }

          run_grapher tests/emulator/scripts/grapher_home_return_smoke.numos
          run_grapher tests/emulator/scripts/grapher_tan_exit_smoke.numos
          run_grapher tests/emulator/scripts/grapher_functions_smoke.numos
          run_grapher tests/emulator/scripts/grapher_logbase_smoke.numos
          run_grapher tests/emulator/scripts/grapher_template_insert_smoke.numos
          run_grapher tests/emulator/scripts/grapher_template_all_smoke.numos
          echo "OK: 6 Phase 9F Grapher no-hang/function/template guards passed (assert-only, NO gating golden)."

      - name: Upload Phase 9F Grapher guard logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numos-emulator-grapher-9f
          path: out/grapher_9f/
          if-no-files-found: ignore

      # ---------------------------------------------------------------------
      # Grapher Phase-10 relation/aspect/classifier guard (GR-00 + GR-02/GR-14).
      #
      # Assert-only, same contract as Phase 9F: each script must exit 0 and
      # print at least one "[ASSERT] ... PASS" with no "[ASSERT] ... FAIL".
      # Covers the previously ORPHANED Phase-10 scripts (implicit/inequality/
      # aspect/mixed/trace-domain/stress), the Phase-10G calc-menu/tangent/
      # intersection/trace smokes, the grapher_bug_* GRBUG-001..005 regression
      # guards, and the grapher_classifier_* semantic suite
      # (one-sided => "one-sided relation", xy=1 => "unknown: xy", x=y^2 =>
      # explicitX, inequalities strict/non-strict — the silent-wrong-plot bugs).
      # grapher_negctl_assert_kind is an INVERTED control: it asserts a wrong
      # kind on purpose and MUST exit 4 with a FAIL marker, proving the assert
      # harness can actually fail. NO golden is gated here.
      - name: Grapher Phase-10 relation/aspect/classifier guard (headless deterministic, GR-00)
        run: |
          set -euo pipefail
          BIN=.pio/build/emulator_pc/program
          mkdir -p out out/grapher_10

          run_grapher10() {
            script="$1"
            name="$(basename "$script" .numos)"
            log="out/grapher_10/${name}.log"
            echo "=== ${name} ==="
            rc=0
            SDL_VIDEODRIVER=dummy timeout 60s "$BIN" \
              --headless --deterministic --script "$script" \
              --frames 1400 --quiet > "$log" 2>&1 || rc=$?
            cat "$log"
            if [ "$rc" -ne 0 ]; then
              echo "::error::grapher-10 guard FAILED for ${name} (exit $rc -- hang/timeout or assertion failure)"
              return 1
            fi
            if grep -qE '\[ASSERT\].*: FAIL -' "$log"; then
              echo "::error::grapher-10 guard: [ASSERT] FAIL present for ${name}"
              return 1
            fi
            if ! grep -qE '\[ASSERT\].*: PASS -' "$log"; then
              echo "::error::grapher-10 guard: no [ASSERT] PASS marker for ${name}"
              return 1
            fi
          }

          # Orphaned Phase-10 relation/aspect scripts (now candidates too).
          run_grapher10 tests/emulator/scripts/grapher_implicit_circle_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_implicit_ycircle_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_implicit_sideways_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_ineq_halfplane_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_ineq_disk_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_ineq_exterior_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_ineq_parabola_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_aspect_circle_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_aspect_small_circle_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_aspect_line_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_aspect_sin_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_aspect_sideways_parabola_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_mixed_relations_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_trace_domain_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_explicit_parabola_smoke.numos
          # Stress / teardown endpoints — gate-only, NEVER candidates or goldens.
          run_grapher10 tests/emulator/scripts/grapher_breakit_stress.numos
          run_grapher10 tests/emulator/scripts/grapher_curve_stress.numos
          run_grapher10 tests/emulator/scripts/grapher_implicit_tabletrace_safe.numos
          # Phase-10G trace/calc-menu smokes — gate-only.
          run_grapher10 tests/emulator/scripts/grapher_trace_explicit_y_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_trace_implicit_circle_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_tangent_implicit_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_intersect_mixed_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_calcmenu_implicit_smoke.numos
          run_grapher10 tests/emulator/scripts/grapher_calcmenu_xfy_smoke.numos
          # GR-02/GR-14 classifier semantic suite (glob: future scripts auto-gate).
          shopt -s nullglob
          classifier=( tests/emulator/scripts/grapher_classifier_*.numos )
          if [ "${#classifier[@]}" -eq 0 ]; then
            echo "::error::no grapher_classifier_*.numos scripts found"
            exit 1
          fi
          for s in "${classifier[@]}"; do
            run_grapher10 "$s"
          done

          # GRBUG-001..005 regression guards (ad536a7: pole-at-x=0, no-step
          # Find Intersection, implicit-mul digit/paren edges). Assert-only;
          # any screenshots go to gitignored out/ as warning-only visuals,
          # NEVER goldens (glob: future grapher_bug_* scripts auto-gate).
          grbug=( tests/emulator/scripts/grapher_bug_*.numos )
          if [ "${#grbug[@]}" -eq 0 ]; then
            echo "::error::no grapher_bug_*.numos scripts found"
            exit 1
          fi
          for s in "${grbug[@]}"; do
            run_grapher10 "$s"
          done

          # INVERTED negative control: must FAIL (exit 4 + FAIL marker).
          neg=tests/emulator/scripts/grapher_negctl_assert_kind.numos
          nlog=out/grapher_10/grapher_negctl_assert_kind.log
          rc=0
          SDL_VIDEODRIVER=dummy timeout 60s "$BIN" \
            --headless --deterministic --script "$neg" \
            --frames 1400 --quiet > "$nlog" 2>&1 || rc=$?
          cat "$nlog"
          if [ "$rc" -ne 4 ]; then
            echo "::error::negative control did NOT exit 4 (exit $rc) — assert harness is not asserting"
            exit 1
          fi
          if ! grep -qE '\[ASSERT\].*: FAIL -' "$nlog"; then
            echo "::error::negative control produced no [ASSERT] FAIL marker"
            exit 1
          fi
          echo "OK: Phase-10 Grapher relation/aspect/classifier guards passed (assert-only, NO gating golden)."

      - name: Upload Phase-10 Grapher guard logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numos-emulator-grapher-10
          path: out/grapher_10/
          if-no-files-found: ignore

      # ---------------------------------------------------------------------
      # Candidate screenshot generation + golden comparison (Phase 4B-A).
      #
      # Additive to the Phase 3A/3B/4A smokes above (kept as-is). This generates
      # CANDIDATE screenshots (launcher + 1+2 + fraction sum) into
      # out/emulator-candidates/ via the same deterministic headless path, then:
      #   * uploads them as an artifact for HUMAN review, and
      #   * compares each candidate to its accepted golden under
      #     tests/emulator/golden/ IFF that golden exists. (Phase 4B-B) If a
      #     matching ignore-rect mask exists under tests/emulator/masks/, the
      #     compare ignores those volatile regions (the blinking cursor); with no
      #     mask the compare is byte-exact, exactly as before.
      # A missing golden is a WARNING, not a failure — so an unreviewed image can
      # never silently become a passing gate. A present golden that mismatches
      # (outside any mask) FAILS the job. See tests/emulator/golden/README.md and
      # tests/emulator/masks/README.md. This still makes NO semantic "1+2=3"
      # claim; that requires a human-reviewed golden.
      - name: Generate candidate screenshots (Phase 4B-A)
        run: |
          set -euo pipefail
          python scripts/generate-emulator-candidates.py \
            --bin .pio/build/emulator_pc/program \
            --out-dir out/emulator-candidates
          echo "--- candidate inventory ---"
          ls -l out/emulator-candidates/

      - name: Upload candidate screenshots (Phase 4B-A)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: numos-emulator-candidates
          path: out/emulator-candidates/
          if-no-files-found: warn

      - name: Compare candidates against accepted goldens (Phase 4B-A)
        run: |
          set -euo pipefail
          shopt -s nullglob
          status=0
          compared=0
          for cand in out/emulator-candidates/*.ppm; do
            name="$(basename "$cand")"
            golden="tests/emulator/golden/$name"
            mask="tests/emulator/masks/${name%.ppm}.mask"
            if [ -f "$golden" ]; then
              if [ -f "$mask" ]; then
                echo "=== comparing $name against accepted golden (masked: $mask) ==="
                cmp_ok=0
                python scripts/compare-ppm.py "$golden" "$cand" --mask-file "$mask" || cmp_ok=$?
              else
                echo "=== comparing $name against accepted golden (exact) ==="
                cmp_ok=0
                python scripts/compare-ppm.py "$golden" "$cand" || cmp_ok=$?
              fi
              if [ "$cmp_ok" -eq 0 ]; then
                echo "OK: $name matches accepted golden."
              else
                echo "::error::PPM mismatch — $name differs from accepted golden $golden (outside any mask)"
                status=1
              fi
              compared=$((compared+1))
            else
              echo "::warning::No accepted golden for $name ($golden missing) — candidate uploaded for human review, not gating CI."
            fi
          done
          echo "Compared $compared candidate(s) against accepted goldens."
          exit $status

      # ── CI-01: guard de árbol limpio (EMUDET §E.3 / CIART §H) ──────────────
      # Ninguna suite puede modificar archivos rastreados ni crear archivos sin
      # rastrear fuera de out/ (área de artefactos, git-ignorada). El sandbox
      # FIX-01/FIX-02 mantiene la persistencia runtime fuera del checkout; este
      # paso impide reintroducir la clase de fallo "test ensucia el repo".
      # Corre siempre (if: always()) para que un rojo anterior no oculte la señal.
      - name: Working tree must be clean after all suites (CI-01)
        if: always()
        run: |
          set -euo pipefail
          echo "--- git diff (tracked modifications) ---"
          git diff --exit-code
          echo "--- untracked files outside out/ ---"
          UNTRACKED=$(git status --porcelain | grep -v '^?? out/' || true)
          if [ -n "$UNTRACKED" ]; then
            echo "$UNTRACKED"
            echo "::error::a suite modified tracked files or created untracked files outside out/"
            exit 1
          fi
          echo "OK: working tree clean after all emulator suites."
